name: Build || Push || Deploy

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: image-service-442420
  REGION: me-central1
  REPO: image-service
  IMAGE: image-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Set image tag
        run: |
          echo "TAG=latest" >> $GITHUB_ENV

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1091263617655/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: githubactions@image-service-442420.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      # ---- Database migration steps ----
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.22.1

      - name: Fetch DB_URI from Secret Manager
        run: |
          DB_URI=$(gcloud secrets versions access latest --secret=DB_URI --project=$PROJECT_ID)
          echo "::add-mask::$DB_URI"
          # Rewrite the socket path: Cloud Run uses /cloudsql/, but the proxy in CI uses /tmp/
          CI_DB_URI=$(echo "$DB_URI" | sed 's|/cloudsql/|/tmp/|')
          echo "::add-mask::$CI_DB_URI"
          echo "CI_DB_URI=$CI_DB_URI" >> $GITHUB_ENV

      - name: Install Cloud SQL Proxy
        run: |
          curl -fsSL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          sudo mv cloud-sql-proxy /usr/local/bin/

      - name: Run database migrations
        run: |
          cloud-sql-proxy image-service-442420:me-central1:image-db --unix-socket /tmp &
          sleep 3
          goose -dir sql/schema postgres "$CI_DB_URI" up
      # ---- End database migration steps ----

      - run: gcloud auth configure-docker me-central1-docker.pkg.dev

      - name: Build image
        run: |
          docker build -t me-central1-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:$TAG .

      - name: Push image
        run: |
          docker push me-central1-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:$TAG

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy image-service \
            --image me-central1-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:$TAG \
            --region $REGION \
            --platform managed \
            --service-account githubactions@image-service-442420.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --add-cloudsql-instances image-service-442420:me-central1:image-db \
            --set-secrets DB_URI=DB_URI:latest,SYMMETRIC_KEY=SYMMETRIC_KEY:latest,ACCESS_TOKEN_DURATION=ACCESS_TOKEN_DURATION:latest,MAILER_PASSWORD=MAILER_PASSWORD:latest,MAILER_HOST=MAILER_HOST:latest,GCLOUD_PROJECT_ID=GCLOUD_PROJECT_ID:latest,GCLOUD_BUCKET_NAME=GCLOUD_BUCKET_NAME:latest
